server:
  port: 8080

# ===================================================================
# SAML 2.0 Relying Party (SP) 生产配置项 (Spring Boot 3.x 规范)
# ===================================================================
spring:
  security:
    saml2:
      relyingparty:
        registration: 
          keycloak: # Registration ID
            signing:
              credentials:
                # YAML 的数组表示法，对应之前的 [0]
                - private-key-location: "classpath:sp-private.key"
                  certificate-location: "classpath:sp-certificate.crt"
            assertingparty:
              # 注意：3.x 必须使用 assertingparty，旧版的 identityprovider 会报红
              metadata-uri: "http://localhost:8081/realms/master/protocol/saml/descriptor"